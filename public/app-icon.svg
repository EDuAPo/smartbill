<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Dollar sign symbol -->
  <g transform="translate(256, 256)">
    <g transform="scale(1.8)">
      <path d="M0 -40 C 15 -40, 25 -30, 25 -15 C 25 0, 5 5, 0 5 C -5 5, -25 0, -25 -15 C -25 -30, -15 -40, 0 -40 Z" 
            fill="white" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M0 -25 L 0 25 M -8 -15 L -8 -5 M -8 5 L -8 15 M 8 -15 L 8 -5 M 8 5 L 8 15" 
            stroke="white" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Subtle highlight -->
  <circle cx="200" cy="200" r="60" fill="white" opacity="0.1"/>
</svg>
